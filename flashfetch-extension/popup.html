<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashFetch</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- Settings screen (optional, hidden by default) -->
  <div id="auth-screen" class="screen hidden">
    <div class="logo-row">
      <span class="logo-dot"></span>
      <span class="logo-text">FlashFetch</span>
    </div>
    <p class="tagline">Setup your Backend</p>
    <div class="field-group">
      <input id="api-url-input" type="text" placeholder="API URL (default: local)" />
      <input id="api-key-input" type="password" placeholder="API Key" />
    </div>
    <button id="save-token-btn" class="btn-primary">Save Settings</button>
  </div>

  <!-- Main chat screen -->
  <div id="chat-screen" class="screen hidden">
    <div class="header">
      <div class="logo-row">
        <span class="logo-dot"></span>
        <span class="logo-text">FlashFetch</span>
      </div>
      <div class="header-actions">
        <button id="save-page-btn" class="icon-btn" title="Save this page as a document">⬆</button>
        <button id="logout-btn" class="icon-btn" title="Disconnect">✕</button>
      </div>
    </div>

    <div id="file-banner" class="file-banner hidden">
      <span id="file-banner-name" class="file-banner-name"></span>
      <span class="file-banner-mode">Using as context</span>
      <button id="file-banner-clear" class="file-banner-clear" title="Switch back to uploaded docs">✕</button>
    </div>

    <div id="messages" class="messages">
      <div class="empty-state">
        <p>Ask anything about your documents.</p>
        <div class="suggestions">
          <button class="suggestion-chip" data-q="Summarize my documents">Summarize documents</button>
          <button class="suggestion-chip" data-q="What are the key topics?">Key topics</button>
        </div>
      </div>
    </div>

    <div id="status-bar" class="status-bar hidden"></div>

    <div class="input-row">
      <input id="question-input" type="text" placeholder="Ask a question…" autocomplete="off" />
      <button id="send-btn" class="btn-send">→</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
